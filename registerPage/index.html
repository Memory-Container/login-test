<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="login-container">
        <form class="login-form">
            <h2>Register</h2>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username" max="36">
            </div>
            <div class="input-group">
                <label for="username">Email</label>
                <input type="text" id="email" name="email" required placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password" maxlength="20">
            </div>
            <div class="error">
                &nbsp;
            </div>
            <button type="submit" class="login-btn">Register</button>
            <p class="signup-link">Don't have an account? <a href="/registerPage/">Sign up</a></p>
        </form>
    </div>
</body>
<script src="script.js"></script>
</html>
